# Cloudflare Pages configuration — static export (Next.js output: 'export')
# The site is fully static; it is served straight from the `out/` directory.
# Do NOT use @cloudflare/next-on-pages (that is for SSR/edge apps and does not
# support output: 'export').
#
# In the Cloudflare Pages dashboard (Settings → Builds & deployments), set:
#   Build command:            pnpm run build
#   Build output directory:   out
#   Framework preset:         None  (or "Next.js (Static HTML Export)")
name = "ahmed-jadani-portfolio"
compatibility_date = "2024-07-29"
pages_build_output_dir = "out"
